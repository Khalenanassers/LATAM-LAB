<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">

  <!-- Background -->
  <rect width="1280" height="400" fill="#080D12"/>

